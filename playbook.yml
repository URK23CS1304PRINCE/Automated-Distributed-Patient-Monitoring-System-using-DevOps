- hosts: localhost
  tasks:

    - name: Stop old container
      docker_container:
        name: patient-app
        state: absent
      ignore_errors: yes

    - name: Pull latest image
      docker_container:
        name: patient-app
        image: judaprince/patient-monitor
        state: started
        restart_policy: always
        ports:
          - "5000:5000"
