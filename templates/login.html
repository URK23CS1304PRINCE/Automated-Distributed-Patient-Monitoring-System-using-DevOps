<!DOCTYPE html>
<html>
<head>
<title>Panda Login</title>

<style>
body {
    margin:0;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 🐼 Panda */
.panda {
    position:absolute;
    top:80px;
    width:120px;
    height:120px;
    background:white;
    border-radius:50%;
}

.eye {
    width:20px;
    height:20px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:40px;
}
.eye.left { left:25px; }
.eye.right { right:25px; }

/* 🐾 Hands pulling */
.hand {
    width:40px;
    height:40px;
    background:black;
    border-radius:50%;
    position:absolute;
    bottom:-20px;
    animation:pull 2s infinite;
}

.hand.left { left:-20px; }
.hand.right { right:-20px; }

@keyframes pull {
    0% { transform:translateY(0); }
    50% { transform:translateY(10px); }
    100% { transform:translateY(0); }
}

/* Login box */
.box {
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:15px;
    text-align:center;
    color:white;
    margin-top:150px;
}

input {
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
}
</style>
</head>

<body>

<div class="panda">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="hand left"></div>
<div class="hand right"></div>
</div>

<div class="box">
<h2>Hospital Login</h2>

<form method="POST">
<input name="username" placeholder="Username"><br>
<input type="password" name="password" placeholder="Password"><br>
<button>Login</button>
</form>

<p>🐼 Secure Monitoring System</p>
</div>

</body>
</html>
